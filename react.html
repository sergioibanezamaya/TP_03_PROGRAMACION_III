<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 3 - React</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body>
    <nav class="navegacion">
        <a href="index.html" class="btn-volver">Volver al inicio</a>
    </nav>

    <h2>Ejercicio 3: Componentes y Estado con React</h2>
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function AppPersonas() {
            const [personas, setPersonas] = useState([]);
            const [formulario, setFormulario] = useState({
                nombre: "", apellido: "", edad: "", altura: "", peso: ""
            });

            const manejarCambio = (e) => {
                setFormulario({
                    ...formulario,
                    [e.target.name]: e.target.value
                });
            };

            const bloquearTeclasNumeros = (e) => {
                if (['e', 'E', '+', '-'].includes(e.key)) {
                    e.preventDefault();
                }
            };

            const validarSoloLetras = (texto) => {
                const regex = /^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$/;
                return regex.test(texto);
            };

            const manejarEnvio = (e) => {
                e.preventDefault();
                
                const nombreLimpio = formulario.nombre.trim();
                const apellidoLimpio = formulario.apellido.trim();

                if (!validarSoloLetras(nombreLimpio) || nombreLimpio === "") {
                    alert("El nombre solo debe contener letras.");
                    return;
                }

                if (!validarSoloLetras(apellidoLimpio) || apellidoLimpio === "") {
                    alert("El apellido solo debe contener letras.");
                    return;
                }

                const pesoNum = parseFloat(formulario.peso);
                const alturaNum = parseFloat(formulario.altura);
                
                if (isNaN(alturaNum) || isNaN(pesoNum) || alturaNum <= 0 || pesoNum <= 0) {
                    alert("El peso y la altura deben ser numeros validos.");
                    return;
                }

                const imc = (pesoNum / (alturaNum * alturaNum)).toFixed(2);

                const nuevaPersona = {
                    nombre: nombreLimpio,
                    apellido: apellidoLimpio,
                    edad: formulario.edad,
                    altura: alturaNum,
                    peso: pesoNum,
                    imc: imc,
                    id: Date.now() 
                };

                setPersonas([...personas, nuevaPersona]);
                setFormulario({ nombre: "", apellido: "", edad: "", altura: "", peso: "" });
            };

            const eliminarPersona = (id) => {
                const filtrados = personas.filter(persona => persona.id !== id);
                setPersonas(filtrados);
            };

            return (
                <div>
                    <form onSubmit={manejarEnvio}>
                        <input type="text" name="nombre" value={formulario.nombre} onChange={manejarCambio} placeholder="Nombre" required />
                        <input type="text" name="apellido" value={formulario.apellido} onChange={manejarCambio} placeholder="Apellido" required />
                        <input type="number" name="edad" value={formulario.edad} onChange={manejarCambio} placeholder="Edad" min="1" required />
                        <input type="number" name="altura" value={formulario.altura} onChange={manejarCambio} onKeyDown={bloquearTeclasNumeros} placeholder="Altura" step="0.01" required />
                        <input type="number" name="peso" value={formulario.peso} onChange={manejarCambio} onKeyDown={bloquearTeclasNumeros} placeholder="Peso" step="0.1" required />
                        <button type="submit">Agregar Persona</button>
                    </form>

                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Apellido</th>
                                <th>Edad</th>
                                <th>Altura</th>
                                <th>Peso</th>
                                <th>IMC</th>
                                <th>Accion</th>
                            </tr>
                        </thead>
                        <tbody>
                            {personas.map((p) => (
                                <tr key={p.id}>
                                    <td>{p.nombre}</td>
                                    <td>{p.apellido}</td>
                                    <td>{p.edad}</td>
                                    <td>{p.altura} m</td>
                                    <td>{p.peso} kg</td>
                                    <td>{p.imc}</td>
                                    <td>
                                        <button className="btn-eliminar" onClick={() => eliminarPersona(p.id)}>
                                            Eliminar
                                        </button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<AppPersonas />);
    </script>
</body>
</html>
