<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 2 - DOM y Eventos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="index.html" class="btn-volver">Volver al inicio</a>
    <h2>Ejercicio 2: Carga de Personas</h2>

    <form id="form-personas">
        <input type="text" name="nombre" placeholder="Nombre" required>
        <input type="text" name="apellido" placeholder="Apellido" required>
        <input type="number" name="edad" placeholder="Edad" min="1" required>
        <input type="number" name="altura" placeholder="Altura (ej: 1.75)" step="0.01" min="0.5" required>
        <input type="number" name="peso" placeholder="Peso (ej: 70.5)" step="0.1" min="10" required>
        <button type="submit">Agregar Persona</button>
    </form>

    <table id="tabla-personas">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
                <th>Altura</th>
                <th>Peso</th>
                <th>IMC</th>
                <th>Accion</th>
            </tr>
        </thead>
        <tbody>
            </tbody>
    </table>

    <script src="personas.js"></script>
</body>
</html>
